name: LansingFerry
options:
  bundleIdPrefix: com.lansingferry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: LL334G7KP2
targets:
  LansingFerry:
    type: application
    platform: iOS
    sources:
      - path: LansingFerry
    settings:
      base:
        INFOPLIST_FILE: LansingFerry/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lansingferry.ios
        OTHER_LDFLAGS: ["-ObjC"]
        SWIFT_VERSION: "5.0"
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]:
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]:
          - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
    dependencies: []
    preBuildScripts:
      - name: "Build KMP Shared Framework"
        script: |
          cd "$SRCROOT/.."
          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
          else
            ./gradlew :shared:linkReleaseFrameworkIosArm64
          fi
        basedOnDependencyAnalysis: false
