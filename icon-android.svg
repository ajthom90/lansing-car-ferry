<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A8FE3"/>
      <stop offset="100%" stop-color="#0B5FA5"/>
    </linearGradient>
  </defs>

  <!-- Background (no rounded corners - Android applies its own mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- "Lansing" text -->
  <text x="512" y="300" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="120" font-weight="700" fill="white" letter-spacing="6">LANSING</text>

  <!-- Water waves -->
  <path d="M0 720 Q128 680 256 720 T512 720 T768 720 T1024 720 L1024 1024 L0 1024 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M0 760 Q128 730 256 760 T512 760 T768 760 T1024 760 L1024 1024 L0 1024 Z" fill="rgba(255,255,255,0.08)"/>
  <path d="M0 810 Q128 780 256 810 T512 810 T768 810 T1024 810 L1024 1024 L0 1024 Z" fill="rgba(255,255,255,0.06)"/>

  <!-- Ferry hull -->
  <path d="M260 660 L300 760 L724 760 L764 660 Z" fill="white" opacity="0.95"/>

  <!-- Ferry cabin -->
  <rect x="340" y="540" width="344" height="120" rx="12" fill="white" opacity="0.95"/>

  <!-- Cabin windows -->
  <rect x="375" y="570" width="40" height="50" rx="6" fill="#0B5FA5" opacity="0.6"/>
  <rect x="435" y="570" width="40" height="50" rx="6" fill="#0B5FA5" opacity="0.6"/>
  <rect x="495" y="570" width="40" height="50" rx="6" fill="#0B5FA5" opacity="0.6"/>
  <rect x="555" y="570" width="40" height="50" rx="6" fill="#0B5FA5" opacity="0.6"/>

  <!-- Pilot house -->
  <rect x="430" y="450" width="164" height="90" rx="10" fill="white" opacity="0.95"/>
  <rect x="452" y="472" width="120" height="45" rx="6" fill="#0B5FA5" opacity="0.5"/>

  <!-- Smoke stack -->
  <rect x="490" y="380" width="44" height="70" rx="6" fill="white" opacity="0.9"/>

  <!-- Railing posts -->
  <line x1="320" y1="640" x2="320" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="370" y1="640" x2="370" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="420" y1="640" x2="420" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="470" y1="640" x2="470" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="520" y1="640" x2="520" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="570" y1="640" x2="570" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="620" y1="640" x2="620" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="670" y1="640" x2="670" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="720" y1="640" x2="720" y2="660" stroke="white" stroke-width="4" opacity="0.7"/>

  <!-- Railing line -->
  <line x1="310" y1="640" x2="730" y2="640" stroke="white" stroke-width="4" opacity="0.7"/>

  <!-- Car silhouettes on deck -->
  <rect x="340" y="680" width="60" height="35" rx="8" fill="#0B5FA5" opacity="0.3"/>
  <rect x="420" y="680" width="60" height="35" rx="8" fill="#0B5FA5" opacity="0.3"/>
  <rect x="500" y="680" width="60" height="35" rx="8" fill="#0B5FA5" opacity="0.3"/>
  <rect x="580" y="680" width="60" height="35" rx="8" fill="#0B5FA5" opacity="0.3"/>
</svg>
